<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">任职资格评审流程</title>
  <desc id="desc">从资格校验、交付件初审、专业考试到分级答辩、独立评分和结果反馈的完整流程。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8f5ee"/>
      <stop offset="1" stop-color="#edf5f4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#25342c" flood-opacity=".13"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#557565"/>
    </marker>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <text x="82" y="96" font-family="'PingFang SC','Microsoft YaHei',Arial,sans-serif" font-size="42" font-weight="700" fill="#25342c">任职资格评审流程</text>
  <text x="82" y="140" font-family="'PingFang SC','Microsoft YaHei',Arial,sans-serif" font-size="21" fill="#66736a">先验证真实交付，再进入考试和答辩；评审的是稳定能力</text>

  <g fill="none" stroke="#557565" stroke-width="4" marker-end="url(#arrow)" opacity=".88">
    <path d="M250 272 H330"/>
    <path d="M530 272 H610"/>
    <path d="M810 272 H890"/>
    <path d="M990 324 V408"/>
    <path d="M904 478 H742"/>
    <path d="M590 478 H428"/>
  </g>

  <g font-family="'PingFang SC','Microsoft YaHei',Arial,sans-serif" filter="url(#shadow)">
    <g transform="translate(70 218)">
      <rect width="180" height="108" rx="18" fill="#ffffff"/>
      <text x="90" y="43" text-anchor="middle" font-size="24" font-weight="700" fill="#25342c">资格校验</text>
      <text x="90" y="76" text-anchor="middle" font-size="16" fill="#657267">时长 / 绩效 / 职级</text>
    </g>
    <g transform="translate(330 218)">
      <rect width="200" height="108" rx="18" fill="#ffffff"/>
      <text x="100" y="43" text-anchor="middle" font-size="24" font-weight="700" fill="#25342c">提交交付件</text>
      <text x="100" y="76" text-anchor="middle" font-size="16" fill="#657267">真实成果 / 个人贡献</text>
    </g>
    <g transform="translate(610 218)">
      <rect width="200" height="108" rx="18" fill="#ffffff"/>
      <text x="100" y="43" text-anchor="middle" font-size="24" font-weight="700" fill="#25342c">评委初审</text>
      <text x="100" y="76" text-anchor="middle" font-size="16" fill="#657267">完整 / 真实 / 匹配</text>
    </g>
    <g transform="translate(890 218)">
      <rect width="200" height="108" rx="18" fill="#ffffff"/>
      <text x="100" y="43" text-anchor="middle" font-size="24" font-weight="700" fill="#25342c">专业考试</text>
      <text x="100" y="76" text-anchor="middle" font-size="16" fill="#657267">初级 / 工作级</text>
    </g>
    <g transform="translate(904 424)">
      <rect width="190" height="108" rx="18" fill="#ffffff"/>
      <text x="95" y="42" text-anchor="middle" font-size="23" font-weight="700" fill="#25342c">分级处理</text>
      <text x="95" y="75" text-anchor="middle" font-size="16" fill="#657267">1-2级免答辩</text>
      <text x="95" y="98" text-anchor="middle" font-size="16" fill="#657267">3级以上答辩</text>
    </g>
    <g transform="translate(590 424)">
      <rect width="152" height="108" rx="18" fill="#ffffff"/>
      <text x="76" y="42" text-anchor="middle" font-size="23" font-weight="700" fill="#25342c">独立评分</text>
      <text x="76" y="76" text-anchor="middle" font-size="16" fill="#657267">统一评分表</text>
    </g>
    <g transform="translate(276 424)">
      <rect width="152" height="108" rx="18" fill="#ffffff"/>
      <text x="76" y="42" text-anchor="middle" font-size="23" font-weight="700" fill="#25342c">评委合议</text>
      <text x="76" y="76" text-anchor="middle" font-size="16" fill="#657267">通过 / 暂缓</text>
    </g>
  </g>

  <g transform="translate(72 410)" font-family="'PingFang SC','Microsoft YaHei',Arial,sans-serif">
    <rect width="154" height="136" rx="22" fill="#315f52"/>
    <text x="77" y="43" text-anchor="middle" font-size="23" font-weight="700" fill="#ffffff">结果反馈</text>
    <text x="77" y="78" text-anchor="middle" font-size="16" fill="#dce9e1">认证结果</text>
    <text x="77" y="105" text-anchor="middle" font-size="16" fill="#dce9e1">能力差距</text>
    <text x="77" y="129" text-anchor="middle" font-size="16" fill="#dce9e1">再次申请建议</text>
  </g>

  <g transform="translate(82 604)" font-family="'PingFang SC','Microsoft YaHei',Arial,sans-serif">
    <rect width="1036" height="62" rx="16" fill="#ffffff" opacity=".92"/>
    <text x="28" y="39" font-size="18" font-weight="700" fill="#315f52">委员会原则：</text>
    <text x="164" y="28" font-size="17" fill="#657267">3级人员可进入评委库；评委原则上高于被评审等级至少一级</text>
    <text x="164" y="50" font-size="17" fill="#657267">每组3-5人，并执行利益回避。</text>
  </g>
</svg>
