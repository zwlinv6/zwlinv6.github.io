<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">中小企业员工积极性激励组合</title>
  <desc id="desc">中小企业在奖金和股权差距有限时，可以通过成长、责任、认可、公平、学习和内部机会提升积极性。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8f5ee"/>
      <stop offset="1" stop-color="#eef3f8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#25342c" flood-opacity=".13"/>
    </filter>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <text x="86" y="104" font-family="'PingFang SC','Microsoft YaHei',Arial,sans-serif" font-size="42" font-weight="700" fill="#25342c">中小企业的激励组合</text>
  <text x="86" y="148" font-family="'PingFang SC','Microsoft YaHei',Arial,sans-serif" font-size="21" fill="#66736a">没有大额年终奖和股票，也不能只复制大厂的高压管理</text>

  <g transform="translate(112 208)" font-family="'PingFang SC','Microsoft YaHei',Arial,sans-serif" filter="url(#shadow)">
    <rect width="420" height="330" rx="22" fill="#ffffff"/>
    <text x="210" y="52" text-anchor="middle" font-size="28" font-weight="700" fill="#7c4234">大厂常见激励</text>
    <line x1="52" y1="80" x2="368" y2="80" stroke="#ead9ca" stroke-width="2"/>
    <text x="70" y="126" font-size="21" font-weight="700" fill="#25342c">高收益差距</text>
    <text x="70" y="158" font-size="18" fill="#68756d">绩效、年终奖、股票拉开差距</text>
    <text x="70" y="212" font-size="21" font-weight="700" fill="#25342c">高压力约束</text>
    <text x="70" y="244" font-size="18" fill="#68756d">连续低绩效会影响岗位稳定</text>
    <text x="70" y="298" font-size="21" font-weight="700" fill="#25342c">高平台机会</text>
    <text x="70" y="330" font-size="18" fill="#68756d">品牌、资源、项目规模更强</text>
  </g>

  <g transform="translate(668 208)" font-family="'PingFang SC','Microsoft YaHei',Arial,sans-serif" filter="url(#shadow)">
    <rect width="420" height="330" rx="22" fill="#ffffff"/>
    <text x="210" y="52" text-anchor="middle" font-size="28" font-weight="700" fill="#315f52">中小企业替代方案</text>
    <line x1="52" y1="80" x2="368" y2="80" stroke="#d7e6dc" stroke-width="2"/>
    <g font-size="19">
      <text x="64" y="124" font-weight="700" fill="#25342c">成长确定性</text>
      <text x="230" y="124" fill="#68756d">等级、能力、项目清楚</text>
      <text x="64" y="169" font-weight="700" fill="#25342c">责任所有权</text>
      <text x="230" y="169" fill="#68756d">模块 owner / 小项目 PL</text>
      <text x="64" y="214" font-weight="700" fill="#25342c">及时认可</text>
      <text x="230" y="214" fill="#68756d">小奖项、公开感谢、专项奖</text>
      <text x="64" y="259" font-weight="700" fill="#25342c">公平机制</text>
      <text x="230" y="259" fill="#68756d">绩效、任职、贡献可解释</text>
      <text x="64" y="304" font-weight="700" fill="#25342c">内部机会</text>
      <text x="230" y="304" fill="#68756d">轮岗、借调、内部项目池</text>
    </g>
  </g>

  <g font-family="'PingFang SC','Microsoft YaHei',Arial,sans-serif">
    <circle cx="600" cy="374" r="64" fill="#315f52"/>
    <text x="600" y="365" text-anchor="middle" font-size="24" font-weight="700" fill="#ffffff">不能只学</text>
    <text x="600" y="397" text-anchor="middle" font-size="24" font-weight="700" fill="#ffffff">压力</text>
  </g>
  <text x="600" y="616" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',Arial,sans-serif" font-size="22" font-weight="700" fill="#315f52">钱的差距有限时，组织要用成长、机会和公平感补上激励感知</text>
</svg>
