<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">团队能力沉淀飞轮</title>
  <desc id="desc">通过问题复盘、规范模板、组件平台、知识资产推动团队效率和质量持续提升。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8f5ee"/>
      <stop offset="1" stop-color="#f1f5f8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#203027" flood-opacity=".13"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#557565"/>
    </marker>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <text x="88" y="104" font-family="'PingFang SC','Microsoft YaHei',Arial,sans-serif" font-size="42" font-weight="700" fill="#25342c">团队能力沉淀飞轮</text>
  <text x="88" y="148" font-family="'PingFang SC','Microsoft YaHei',Arial,sans-serif" font-size="21" fill="#66736a">把一次项目经验，转化为下一次交付的默认能力</text>

  <g fill="none" stroke="#557565" stroke-width="5" marker-end="url(#arrow)" opacity=".85">
    <path d="M430 184 C540 116 690 128 790 214"/>
    <path d="M918 356 C904 496 796 600 656 622"/>
    <path d="M506 610 C374 570 286 456 294 318"/>
  </g>

  <g font-family="'PingFang SC','Microsoft YaHei',Arial,sans-serif" filter="url(#shadow)">
    <g transform="translate(280 218)">
      <rect width="222" height="124" rx="20" fill="#ffffff"/>
      <text x="111" y="47" text-anchor="middle" font-size="26" font-weight="700" fill="#25342c">问题复盘</text>
      <text x="111" y="82" text-anchor="middle" font-size="18" fill="#657267">根因分析</text>
      <text x="111" y="108" text-anchor="middle" font-size="18" fill="#657267">预防动作</text>
    </g>
    <g transform="translate(683 218)">
      <rect width="222" height="124" rx="20" fill="#ffffff"/>
      <text x="111" y="47" text-anchor="middle" font-size="26" font-weight="700" fill="#25342c">规范模板</text>
      <text x="111" y="82" text-anchor="middle" font-size="18" fill="#657267">SOP / Checklist</text>
      <text x="111" y="108" text-anchor="middle" font-size="18" fill="#657267">评审标准</text>
    </g>
    <g transform="translate(698 468)">
      <rect width="222" height="124" rx="20" fill="#ffffff"/>
      <text x="111" y="47" text-anchor="middle" font-size="26" font-weight="700" fill="#25342c">组件平台</text>
      <text x="111" y="82" text-anchor="middle" font-size="18" fill="#657267">灰度 / 网关</text>
      <text x="111" y="108" text-anchor="middle" font-size="18" fill="#657267">消息 / 缓存</text>
    </g>
    <g transform="translate(276 468)">
      <rect width="222" height="124" rx="20" fill="#ffffff"/>
      <text x="111" y="47" text-anchor="middle" font-size="26" font-weight="700" fill="#25342c">知识资产</text>
      <text x="111" y="82" text-anchor="middle" font-size="18" fill="#657267">设计文档</text>
      <text x="111" y="108" text-anchor="middle" font-size="18" fill="#657267">项目总结</text>
    </g>
  </g>

  <g font-family="'PingFang SC','Microsoft YaHei',Arial,sans-serif">
    <circle cx="600" cy="390" r="112" fill="#315f52"/>
    <text x="600" y="368" text-anchor="middle" font-size="31" font-weight="700" fill="#ffffff">效率 + 质量</text>
    <text x="600" y="408" text-anchor="middle" font-size="19" fill="#dce9e1">不是一次治理</text>
    <text x="600" y="436" text-anchor="middle" font-size="19" fill="#dce9e1">而是持续循环</text>
  </g>

  <g font-family="'PingFang SC','Microsoft YaHei',Arial,sans-serif" font-size="18" fill="#5f6d63">
    <text x="96" y="646">沉淀方式：把问题变成规则，把规则变成工具，把工具变成团队默认工作方式。</text>
  </g>
</svg>
